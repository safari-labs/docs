; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:pico]
platform = raspberrypi
board = pico
framework = arduino

lib_deps =
    adafruit/Adafruit ICM20X@^2.0.5
    adafruit/Adafruit BusIO
    adafruit/Adafruit Unified Sensor

; MS5607 library lives in Libnexamples/MS5607-master — PlatformIO picks it up
; from that subdirectory automatically via lib_extra_dirs.
lib_extra_dirs = Libnexamples

monitor_speed = 115200
; Prevent src/main.cpp from being compiled during test builds on this env,
; which would create duplicate setup()/loop() symbols with the test files.
test_build_src = no
build_flags    = -Wl,--allow-multiple-definition

[env:pico_test]
; Test environment — all suites flash to the Pico and report via USB serial
platform        = raspberrypi
board           = pico
framework       = arduino
lib_deps =
    adafruit/Adafruit ICM20X@^2.0.5
    adafruit/Adafruit BusIO
    adafruit/Adafruit Unified Sensor
lib_extra_dirs  = Libnexamples
; Prevent src/main.cpp setup()/loop() from conflicting with Unity entry point
test_build_src  = no
monitor_speed   = 115200
; Arduino-Mbed already bundles Unity inside libmbed.a; PlatformIO adds a second
; copy (libUnity.a), causing "multiple definition" linker errors. This flag tells
; the linker to keep the first definition and ignore the duplicates.
build_flags     = -Wl,--allow-multiple-definition
