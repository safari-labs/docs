site_name: Your Project Documentation
site_url: https://your-org.github.io/docs

theme:
  name: material
  features:
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed
  - admonition
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Fire Risk Model:
    - Overview: fire-risk-model/index.md
    - Installation: fire-risk-model/installation.md
    - Data Pipeline: fire-risk-model/data-pipeline.md
    - Training:
      - Stage 1 — Ecology Model: fire-risk-model/training-ecology.md
      - Stage 2 — Fire Risk Model: fire-risk-model/training-fire-risk.md
    - Inference: fire-risk-model/inference.md
    - Deployment: fire-risk-model/deployment.md
    - Architecture: fire-risk-model/architecture.md
  - ProtoSat CAN-SBX:
    - Overview: protosat-cansbx/index.md
  - ADCS Firmware:
    - Overview: adcs-firmware/index.md
  - WDM Firmware:
    - Overview: wdm-firmware/index.md
  - CAO ProtoSat:
    - Overview: cao-protosat/index.md
  - Cariboulite:
    - Overview: cariboulite/index.md
  - RF Radiation Pattern Simulator:
    - Overview: rf-radiation/index.md
  - Camera Setup:
    - Conversion: camera/conversion.md
    - Settings: camera/settings.md
  - Calibration Procedure:
    - Overview: calibration/overview.md
    - White Balance: calibration/cwb.md
    - ColorChecker: calibration/colorchecker.md
    - Wavelength Characterization: calibration/wavelengths.md
    - Regression Models: calibration/regression.md
    - Validation: calibration/validation.md
  - Index Selection:
    - NDVI vs NDRE: calibration/index-selection.md
    - ImageJ Scripts: calibration/imagej.md