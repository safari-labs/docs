; PlatformIO Project Configuration File
;
; 'pio run'              -> compile le firmware de production (env pico)
; 'pio test -e native'   -> compile ET execute les tests unitaires sur le PC (aucun materiel)
; 'pio test'             -> tests unitaires sur le Pico (env pico, upload requis)
; 'pio test -e test_unit'-> idem, env de test dedie
; 'pio test -e test_hw'  -> tests hardware, loopback GPIO requis (voir test_main.cpp)
[platformio]
default_envs = pico

; --- Base commune aux cibles RP2040 (hardware) ---
[arduino_base]
platform  = raspberrypi
framework = arduino
; Reglages tests (sans effet sur 'pio run') : compile src/ avec le test, et
; autorise la multiple definition d'Unity (arduino-mbed embarque sa copie).
test_build_src = yes
build_flags = -Wl,--allow-multiple-definition

[env:pico]
extends        = arduino_base
board          = pico
upload_port    = COM10
; 'pio test' sans -e cible cet env : restreint aux tests unitaires.
test_port      = COM10
test_speed     = 115200
test_framework = unity
test_filter    = test_unit_watchdog




; --- Tests NATIFS sur PC (aucun Pico requis) ---
; Compile la logique pure (behavior/ + PowerChannel) contre des mocks
; (test/mocks/) et execute Unity directement sur la machine. Couvre toutes les
; suites test_unit_* (watchdog, flightstate, telemetry).
; gc-sections elimine les methodes non testees qui tireraient du hardware
; (ex. Telemetry::transmit -> ttc/UART).
[env:native]
platform       = native
test_framework = unity
test_filter    = test_unit_*
test_build_src = yes
build_src_filter = +<behavior/> +<subsystems/PowerChannel.cpp>
build_flags    = -std=c++17 -I test/mocks -I include -I src -ffunction-sections -fdata-sections -Wl,--gc-sections
