all:
  children:
    jetson_hosts:
      hosts:
        jetson:
          ansible_host: jetson.local
          ansible_user: sm
          ansible_ssh_private_key_file: ~/.ssh/assfid_ffed
          ansible_python_interpreter: /usr/bin/python3
          ansible_become: true
          ansible_become_method: sudo
          ansible_become_password: "{{ vault_become_password }}"
    jetson_a603:
      hosts:
        jetson-a603:
          ansible_host: jetson-a603.lan
          ansible_user: ansible
          ansible_ssh_private_key_file: ~/.ssh/assfid_ffed
          ansible_python_interpreter: /usr/bin/python3
          ansible_become: true
          ansible_become_method: sudo
          ansible_become_password: "{{ vault_become_password }}"
